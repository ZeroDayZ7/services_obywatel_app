secrets:
  auth_db_pass:
    file: ./secrets/.auth_db_password
  citizen_db_pass:
    file: ./secrets/.citizen_db_password
  notify_db_pass:
    file: ./secrets/.notify_db_password
  redis_auth_pass:
    file: ./secrets/.redis_password
  pgadmin_root_pass:
    file: ./secrets/.pgadmin_admin_password

volumes:
  pg_auth_data:
  pg_citizen_docs_data:
  pg_notification_data:
  redis_data:
  go-modules:

networks:
  citizen-app-net:
    name: obywatel_app__network
    driver: bridge
